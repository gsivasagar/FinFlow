services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - sqlite-data:/app/data
    environment:
      - PORT=3000
      - JWT_SECRET=change_me_in_production
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite-data:
